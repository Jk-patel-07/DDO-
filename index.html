<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ddo-horse-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ddo</title>
    <style>
      body.ddo-toolbar-hidden,
      body.ddo-toolbar-hidden #root,
      body.ddo-toolbar-hidden .toolbar-root,
      body.ddo-toolbar-hidden .status-bar-layer {
        background: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        box-shadow: none !important;
        border: none !important;
      }
      body.ddo-toolbar-hidden .toolbar-root::before,
      body.ddo-toolbar-hidden .toolbar-root::after,
      body.ddo-toolbar-hidden .status-bar-layer::before,
      body.ddo-toolbar-hidden .status-bar-layer::after {
        display: none !important;
        content: none !important;
      }
    </style>
  </head>
  <body class="ddo-toolbar-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
